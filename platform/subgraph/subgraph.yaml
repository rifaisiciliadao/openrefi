specVersion: 1.0.0
description: GrowFi — Regenerative Finance Subgraph
repository: https://github.com/growfi/growfi
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: CampaignFactory
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: CampaignFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/factory.ts
      entities:
        - Campaign
        - GlobalStats
      abis:
        - name: CampaignFactory
          file: ./abis/CampaignFactory.json
        - name: Campaign
          file: ./abis/Campaign.json
      eventHandlers:
        - event: CampaignCreated(indexed address,indexed address,address,address,address,address,uint256,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleCampaignCreated
        - event: ProtocolFeeRecipientUpdated(address,address)
          handler: handleProtocolFeeRecipientUpdated

templates:
  - kind: ethereum/contract
    name: Campaign
    network: arbitrum-sepolia
    source:
      abi: Campaign
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/campaign.ts
      entities:
        - Campaign
        - AcceptedToken
        - Purchase
        - SellBackOrder
        - User
      abis:
        - name: Campaign
          file: ./abis/Campaign.json
      eventHandlers:
        - event: TokensPurchased(indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleTokensPurchased
        - event: AcceptedTokenAdded(indexed address,string,uint8,uint256,address)
          handler: handleAcceptedTokenAdded
        - event: AcceptedTokenRemoved(indexed address)
          handler: handleAcceptedTokenRemoved
        - event: CampaignStateChanged(uint8,uint8)
          handler: handleCampaignStateChanged
        - event: CampaignActivated(uint256,uint256)
          handler: handleCampaignActivated
        - event: BuybackTriggered(uint256,uint256,uint256)
          handler: handleBuybackTriggered
        - event: BuybackClaimed(indexed address,indexed address,uint256,uint256)
          handler: handleBuybackClaimed
        - event: SellBackRequested(indexed address,uint256,uint256)
          handler: handleSellBackRequested
        - event: SellBackFilled(indexed address,indexed address,address,uint256,uint256,uint256)
          handler: handleSellBackFilled
        - event: SellBackCancelled(indexed address,uint256)
          handler: handleSellBackCancelled
        - event: CampaignPaused(bool)
          handler: handleCampaignPaused

  - kind: ethereum/contract
    name: StakingVault
    network: arbitrum-sepolia
    source:
      abi: StakingVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/staking.ts
      entities:
        - Position
        - Season
        - YieldRateSnapshot
        - Campaign
      abis:
        - name: StakingVault
          file: ./abis/StakingVault.json
      eventHandlers:
        - event: Staked(indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,indexed uint256,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleUnstaked
        - event: Restaked(indexed address,indexed uint256,uint256,uint256)
          handler: handleRestaked
        - event: YieldMinted(indexed address,indexed uint256,uint256,uint256)
          handler: handleYieldMinted
        - event: YieldRateUpdated(uint256,uint256,uint256)
          handler: handleYieldRateUpdated
        - event: SeasonStarted(indexed uint256,uint256)
          handler: handleSeasonStarted
        - event: SeasonEnded(indexed uint256,uint256,uint256)
          handler: handleSeasonEnded

  - kind: ethereum/contract
    name: HarvestManager
    network: arbitrum-sepolia
    source:
      abi: HarvestManager
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/harvest.ts
      entities:
        - Season
        - Claim
        - Campaign
      abis:
        - name: HarvestManager
          file: ./abis/HarvestManager.json
      eventHandlers:
        - event: HarvestReported(indexed uint256,uint256,uint256,uint256,uint256,bytes32,uint256,uint256,uint256)
          handler: handleHarvestReported
        - event: ProductRedeemed(indexed address,indexed uint256,uint256,uint256,bytes32)
          handler: handleProductRedeemed
        - event: USDCRedeemed(indexed address,indexed uint256,uint256,uint256)
          handler: handleUSDCRedeemed
        - event: USDCDeposited(indexed uint256,indexed address,uint256,uint256,uint256)
          handler: handleUSDCDeposited
        - event: USDCClaimed(indexed address,indexed uint256,uint256)
          handler: handleUSDCClaimed
        - event: ProtocolFeeCollected(indexed uint256,uint256,address)
          handler: handleProtocolFeeCollected
