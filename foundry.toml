[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[invariant]
runs = 256
depth = 128
fail_on_revert = false

# Lighter profile for CI. `FOUNDRY_PROFILE=ci forge test` shrinks the
# invariant + fuzz budget so the GROW suite (17 invariants, ~50 fuzz
# tests) fits inside the workflow's 40-min timeout. Local dev stays on
# the full profile.
[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.ci.invariant]
runs = 32
depth = 24
fail_on_revert = false

[profile.ci.fuzz]
runs = 64

[fmt]
line_length = 120
