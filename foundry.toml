[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[invariant]
runs = 256
depth = 128
fail_on_revert = false

# Lighter profile for CI. `FOUNDRY_PROFILE=ci forge test` cuts the
# invariant sweep from 11×256×128 = 360k sequences (~25min on the
# ubuntu-latest runner) down to 11×64×48 = 34k (~3min) while keeping
# the fuzz coverage defaults. Local dev stays on the full profile.
[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.ci.invariant]
runs = 64
depth = 48
fail_on_revert = false

[profile.ci.fuzz]
runs = 128

[fmt]
line_length = 120
