name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    # Hard cap so a hung test (public-RPC retry loop, misbehaving invariant,
    # etc.) can never burn 6h of CI time again. The full suite runs in ~10min.
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      # test/fork/* targets hit hardcoded public RPCs (arb1.arbitrum.io,
      # base, mainnet) which rate-limit and hang inside vm.createSelectFork
      # on GitHub Actions — the try/catch doesn't abort the retry loop.
      # Matches the documented local command in CLAUDE.md.
      - name: Run Forge tests
        run: forge test -vvv --no-match-path "test/fork/*"
